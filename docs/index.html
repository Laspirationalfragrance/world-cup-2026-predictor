<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0e1a">
<meta name="description" content="2026 FIFA World Cup Match Predictions — AI-powered probability model">
<title>⚽ 2026 世界杯预测</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0e1a;
  --bg-card: #111627;
  --bg-card-hover: #181e33;
  --border: #1e2640;
  --border-active: #2a3355;
  --text: #e8eaf0;
  --text-secondary: #8891a5;
  --text-muted: #5a6380;
  --accent: #c8102e;
  --accent-glow: rgba(200,16,46,0.3);
  --gold: #f0b90b;
  --gold-glow: rgba(240,185,11,0.25);
  --green: #00c853;
  --green-bg: rgba(0,200,83,0.12);
  --yellow: #f59e0b;
  --yellow-bg: rgba(245,158,11,0.12);
  --red: #ef4444;
  --red-bg: rgba(239,68,68,0.12);
  --blue-accent: #3b82f6;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
  --font-display: 'Oswald', 'Impact', sans-serif;
  --font-body: 'Inter', 'Noto Sans SC', system-ui, sans-serif;
  --safe-bottom: env(safe-area-inset-bottom, 16px);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html {
  font-size: 16px;
  -webkit-text-size-adjust: 100%;
  scroll-behavior: smooth;
}

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  min-height: 100dvh;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
  background-image:
    radial-gradient(ellipse at 50% 0%, rgba(200,16,46,0.08) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 100%, rgba(240,185,11,0.04) 0%, transparent 50%);
}

/* ── Header ── */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(10,14,26,0.85);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
}

.header-inner {
  max-width: 640px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-display);
  font-size: 1.25rem;
  font-weight: 700;
  letter-spacing: 0.02em;
  color: var(--text);
  text-transform: uppercase;
}

.logo-icon {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), #e81e3f);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.2rem;
  box-shadow: 0 2px 12px var(--accent-glow);
}

.logo-year {
  color: var(--gold);
  font-size: 0.75rem;
  font-weight: 500;
  letter-spacing: 0.1em;
  opacity: 0.9;
}

/* ── Date Selector ── */
.date-selector {
  position: relative;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

.date-trigger {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  cursor: pointer;
  transition: all 0.2s;
}

.date-trigger:active {
  background: var(--bg-card-hover);
}

.date-trigger-icon {
  font-size: 1.25rem;
  flex-shrink: 0;
}

.date-trigger-label {
  flex: 1;
  font-family: var(--font-body);
  font-size: 0.95rem;
  font-weight: 500;
  color: var(--text);
  min-width: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.date-trigger-arrow {
  flex-shrink: 0;
  width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

.date-trigger-arrow svg {
  width: 14px;
  height: 14px;
  stroke: var(--text-secondary);
  stroke-width: 2;
  fill: none;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.date-selector.open .date-trigger {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(240,185,11,0.1);
}

.date-selector.open .date-trigger-arrow {
  transform: rotate(180deg);
}

.date-selector.open .date-trigger-arrow svg {
  stroke: var(--gold);
}

/* ── Dropdown ── */
.date-dropdown {
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  right: 0;
  background: var(--bg-card);
  border: 1px solid var(--border-active);
  border-radius: var(--radius);
  overflow: hidden;
  z-index: 200;
  display: none;
  box-shadow: 0 12px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04) inset;
  animation: dropdownIn 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

.date-selector.open .date-dropdown {
  display: block;
}

@keyframes dropdownIn {
  from { opacity: 0; transform: translateY(-8px); }
  to { opacity: 1; transform: translateY(0); }
}

.date-dropdown-scroll {
  max-height: 280px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  scroll-behavior: smooth;
  padding: 4px 0;
}

.date-dropdown-scroll::-webkit-scrollbar {
  width: 3px;
}

.date-dropdown-scroll::-webkit-scrollbar-track {
  background: transparent;
}

.date-dropdown-scroll::-webkit-scrollbar-thumb {
  background: var(--border-active);
  border-radius: 3px;
}

.date-option {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 11px 14px;
  cursor: pointer;
  transition: background 0.1s;
  font-size: 0.9rem;
  font-weight: 500;
  color: var(--text);
}

.date-option:active, .date-option:hover {
  background: rgba(255,255,255,0.04);
}

.date-option.selected {
  background: rgba(240,185,11,0.08);
  color: var(--gold);
}

.date-option .opt-icon {
  font-size: 1rem;
  flex-shrink: 0;
  width: 24px;
  text-align: center;
}

.date-option .opt-label {
  flex: 1;
}

.date-option .opt-badge {
  font-size: 0.65rem;
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 600;
  letter-spacing: 0.04em;
}

.date-option .opt-badge.group { background: rgba(59,130,246,0.15); color: #60a5fa; }
.date-option .opt-badge.ko { background: rgba(240,185,11,0.15); color: var(--gold); }

/* Backdrop to close dropdown */
.date-backdrop {
  position: fixed;
  inset: 0;
  z-index: 199;
  display: none;
}

.date-selector.open ~ .date-backdrop {
  display: block;
}

/* ── Stats Bar ── */
.stats-bar {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding: 4px 0;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}

.stats-bar::-webkit-scrollbar { display: none; }

.stat-chip {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 0.75rem;
  font-weight: 500;
  white-space: nowrap;
}

.stat-chip.matches { background: rgba(59,130,246,0.15); color: #60a5fa; }
.stat-chip.high-conf { background: var(--green-bg); color: var(--green); }
.stat-chip.upset { background: var(--red-bg); color: var(--red); }
.stat-chip.hot { background: var(--yellow-bg); color: var(--yellow); }

/* ── Main Content ── */
.main {
  max-width: 640px;
  margin: 0 auto;
  padding: 16px;
  padding-bottom: calc(80px + var(--safe-bottom));
}

/* ── Date Section ── */
.date-section {
  margin-bottom: 24px;
}

.date-heading {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
}

.date-label {
  font-family: var(--font-display);
  font-size: 1.1rem;
  font-weight: 600;
  letter-spacing: 0.03em;
  text-transform: uppercase;
}

.date-label .day {
  color: var(--gold);
}

.date-divider {
  flex: 1;
  height: 1px;
  background: linear-gradient(to right, var(--border-active), transparent);
}

/* ── Match Card ── */
/* ── Auth Gate ── */
.auth-overlay {
  position: fixed;
  inset: 0;
  z-index: 10000;
  background: var(--bg);
  background-image:
    radial-gradient(ellipse at 50% 30%, rgba(200,16,46,0.12) 0%, transparent 60%),
    radial-gradient(ellipse at 50% 80%, rgba(240,185,11,0.06) 0%, transparent 50%);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s ease;
}
.auth-overlay.unlock {
  transform: translateY(-100%);
  opacity: 0;
  pointer-events: none;
}
.auth-card {
  width: 100%;
  max-width: 380px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 36px 28px;
  box-shadow: var(--shadow), 0 0 60px rgba(200,16,46,0.08);
  text-align: center;
}
.auth-icon {
  font-size: 3rem;
  margin-bottom: 8px;
  filter: drop-shadow(0 0 12px rgba(240,185,11,0.3));
}
.auth-title {
  font-family: var(--font-display);
  font-size: 1.5rem;
  font-weight: 700;
  letter-spacing: 0.04em;
  color: var(--text);
  margin-bottom: 4px;
  text-transform: uppercase;
}
.auth-subtitle {
  font-size: 0.8rem;
  color: var(--text-muted);
  margin-bottom: 24px;
}
.auth-step-dots {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-bottom: 20px;
}
.auth-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--border-active);
  transition: background 0.3s, box-shadow 0.3s;
}
.auth-dot.active {
  background: var(--gold);
  box-shadow: 0 0 8px var(--gold-glow);
}
.auth-dot.done {
  background: var(--green);
}
.auth-input-group {
  margin-bottom: 16px;
  text-align: left;
}
.auth-label {
  display: block;
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 6px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.auth-input {
  width: 100%;
  padding: 12px 14px;
  background: rgba(10,14,26,0.6);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 0.95rem;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  -webkit-appearance: none;
}
.auth-input:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(240,185,11,0.12);
}
.auth-input.error {
  border-color: var(--red);
  box-shadow: 0 0 0 3px rgba(239,68,68,0.15);
  animation: auth-shake 0.4s ease;
}
.auth-input.success {
  border-color: var(--green);
}
@keyframes auth-shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-6px); }
  40% { transform: translateX(6px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
}
.auth-error-text {
  font-size: 0.72rem;
  color: var(--red);
  margin-top: 4px;
  min-height: 18px;
}
.auth-hint {
  font-size: 0.7rem;
  color: var(--text-muted);
  margin-top: 8px;
  margin-bottom: 16px;
  line-height: 1.6;
}
.auth-btn {
  width: 100%;
  padding: 12px;
  background: linear-gradient(135deg, #c8102e, #e81c3c);
  border: none;
  border-radius: var(--radius-sm);
  color: #fff;
  font-family: var(--font-body);
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.1s;
  letter-spacing: 0.03em;
}
.auth-btn:hover { opacity: 0.9; }
.auth-btn:active { transform: scale(0.97); }
.auth-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}
.auth-welcome {
  font-family: var(--font-display);
  font-size: 1.1rem;
  color: var(--gold);
  margin-top: 16px;
  opacity: 0;
  transition: opacity 0.4s;
}
.auth-welcome.show { opacity: 1; }
@media (prefers-reduced-motion: reduce) {
  .auth-overlay { transition: opacity 0.15s ease; }
  .auth-input.error { animation: none; }
}
@media (max-width: 360px) {
  .auth-card { padding: 24px 16px; }
  .auth-title { font-size: 1.25rem; }
}

.match-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}

.match-card:active {
  transform: scale(0.985);
  background: var(--bg-card-hover);
}

.match-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 3px;
  height: 100%;
  border-radius: 3px 0 0 3px;
}

.match-card.confidence-high::before { background: var(--green); }
.match-card.confidence-medium::before { background: var(--yellow); }
.match-card.confidence-low::before { background: var(--red); }

.match-card.upset-high { border-color: rgba(239,68,68,0.3); }
.match-card.upset-high::after {
  content: '⚠️ 爆冷风险';
  position: absolute;
  top: 8px; right: 10px;
  font-size: 0.65rem;
  color: var(--red);
  font-weight: 600;
  letter-spacing: 0.05em;
  opacity: 0.85;
}

/* ── Past Match (Result) Card ── */
.match-card.past {
  opacity: 0.75;
  border-color: rgba(255,255,255,0.04);
}

.match-card.past::before { background: var(--text-muted); }

.result-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.04em;
  background: rgba(100,116,139,0.15);
  color: var(--text-secondary);
  border: 1px solid rgba(100,116,139,0.2);
}

.result-final {
  font-family: var(--font-display);
  font-size: 2rem;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.08em;
  line-height: 1;
}

.result-winner {
  color: var(--gold);
  font-weight: 700;
}

.result-summary {
  margin-top: 10px;
  padding: 8px 10px;
  background: rgba(255,255,255,0.02);
  border-radius: var(--radius-sm);
  font-size: 0.72rem;
  color: var(--text-secondary);
  border-left: 2px solid var(--text-muted);
}

/* ── Knockout Bracket ── */
.knockout-section {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 16px;
}

.knockout-header {
  margin-bottom: 14px;
}

.knockout-title {
  font-family: var(--font-display);
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 0.04em;
  display: block;
}

.knockout-subtitle {
  font-size: 0.72rem;
  color: var(--text-muted);
  margin-top: 2px;
}

.knockout-rounds {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
  gap: 8px;
  margin-bottom: 14px;
}

.knockout-round {
  padding: 10px 8px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  text-align: center;
  opacity: 0.5;
  transition: all 0.2s;
}

.knockout-round.active {
  border-color: var(--gold);
  opacity: 1;
  background: rgba(240,185,11,0.08);
}

.knockout-round.past {
  opacity: 0.35;
}

.knockout-round-name {
  font-family: var(--font-display);
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--text);
}

.knockout-round-dates {
  font-size: 0.6rem;
  color: var(--text-muted);
  margin-top: 2px;
}

.knockout-match-count {
  font-size: 0.65rem;
  color: var(--gold);
  font-weight: 600;
  margin-top: 3px;
}

.knockout-notice {
  display: flex;
  gap: 12px;
  padding: 14px;
  background: rgba(240,185,11,0.06);
  border-radius: var(--radius-sm);
  border: 1px solid rgba(240,185,11,0.15);
  align-items: center;
}

.knockout-notice-icon {
  font-size: 1.8rem;
  flex-shrink: 0;
}

.knockout-notice strong {
  color: var(--gold);
  display: block;
  margin-bottom: 4px;
}

.knockout-notice code {
  background: rgba(255,255,255,0.06);
  padding: 1px 6px;
  border-radius: 4px;
  font-size: 0.68rem;
  color: var(--text-secondary);
}

/* ── Card Header ── */
.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.group-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.04em;
  background: rgba(240,185,11,0.12);
  color: var(--gold);
  border: 1px solid rgba(240,185,11,0.2);
}

.match-num {
  font-size: 0.7rem;
  color: var(--text-muted);
  font-weight: 500;
}

/* ── Teams ── */
.teams-row {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 12px;
  margin-bottom: 14px;
}

.team {
  text-align: center;
}

.team-flag {
  font-size: 2rem;
  line-height: 1;
  margin-bottom: 4px;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
}

.team-name {
  font-size: 0.85rem;
  font-weight: 600;
  line-height: 1.2;
  color: var(--text);
}

.team-name-en {
  font-size: 0.65rem;
  color: var(--text-secondary);
  font-weight: 400;
  text-transform: uppercase;
  letter-spacing: 0.03em;
}

.vs-badge {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}

.vs-text {
  font-family: var(--font-display);
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--text-muted);
  letter-spacing: 0.05em;
}

.vs-score {
  font-family: var(--font-display);
  font-size: 1.6rem;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 0.06em;
  line-height: 1;
}

/* ── Probability Bars ── */
.prob-section {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  margin-bottom: 10px;
}

.prob-item {
  text-align: center;
}

.prob-label {
  font-size: 0.65rem;
  color: var(--text-muted);
  font-weight: 500;
  margin-bottom: 3px;
  letter-spacing: 0.03em;
  text-transform: uppercase;
}

.prob-value {
  font-family: var(--font-display);
  font-size: 1.15rem;
  font-weight: 600;
  line-height: 1;
}

.prob-value.win { color: var(--green); }
.prob-value.draw { color: var(--text-secondary); }
.prob-value.lose { color: var(--red); }

.prob-bar-track {
  height: 3px;
  background: rgba(255,255,255,0.06);
  border-radius: 2px;
  margin-top: 4px;
  overflow: hidden;
}

.prob-bar-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.3s ease;
}

.prob-bar-fill.win { background: var(--green); }
.prob-bar-fill.draw { background: var(--text-secondary); }
.prob-bar-fill.lose { background: var(--red); }

/* ── Knockout Result & Advance ── */
.ko-result {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 10px 14px;
  background: linear-gradient(135deg, rgba(240,185,11,0.1), rgba(240,185,11,0.03));
  border-radius: var(--radius-sm);
  border: 1px solid rgba(240,185,11,0.2);
  margin-bottom: 12px;
}

.ko-result-icon {
  font-size: 1.4rem;
  flex-shrink: 0;
}

.ko-result-body {
  text-align: center;
}

.ko-result-text {

const AUTH_ENABLED = true;
const AUTH_PASSWORD_HASH = "1a8837466e2762afd8d407d67cab479239f1380ef44bd6ae0c887fbcaff8f20f";
const AUTH_CODE_HASHES = {"管理员":"9410fff88b21520d0b2f3be8ab3606da02928747b8768118033b7e7c404ebb66"};

async function authSha256(text) {
  const encoder = new TextEncoder();
  const data = encoder.encode(text);
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

function getDeviceFingerprint() {
  const fp = [
    navigator.hardwareConcurrency || 4,
    navigator.maxTouchPoints || 0,
    screen.width + 'x' + screen.height,
    navigator.language,
    Intl.DateTimeFormat().resolvedOptions().timeZone,
    navigator.platform
  ].join('|');
  let hash = 0;
  for (let i = 0; i < fp.length; i++) {
    const char = fp.charCodeAt(i);
    hash = ((hash << 5) - hash) + char;
    hash = hash & hash;
  }
  return 'DEV-' + Math.abs(hash).toString(36).toUpperCase().slice(0, 8);
}

function getAuthToken() {
  try { return JSON.parse(localStorage.getItem('_fifa2026_auth') || 'null'); }
  catch { return null; }
}

function setAuthToken(token) {
  try { localStorage.setItem('_fifa2026_auth', JSON.stringify(token)); } catch {}
}

async function checkSavedAuth() {
  if (!AUTH_ENABLED) return true;
  const token = getAuthToken();
  if (!token) return false;
  const deviceId = getDeviceFingerprint();
  if (token.device !== deviceId) return false;
  const hash = await authSha256(token.codeHash + deviceId);
  for (const [name, codeHash] of Object.entries(AUTH_CODE_HASHES)) {
    if (codeHash === token.codeHash) return name;
  }
  return false;
}

  const overlay = document.createElement('div');
  overlay.className = 'auth-overlay';
  overlay.id = 'auth-overlay';

  let step = 1;

  function showError(input, errorEl, msg) {
    input.classList.add('error');
    errorEl.textContent = msg;
    setTimeout(() => input.classList.remove('error'), 500);
  }

  async function handlePassword(input, btn, error) {
    const pw = input.value.trim();
    if (!pw) { showError(input, error, '请输入访问密码'); return; }
    btn.disabled = true;
    btn.textContent = '验证中…';
    const hash = await authSha256(pw);
    if (hash === AUTH_PASSWORD_HASH) {
      input.classList.add('success');
      error.textContent = '';
      step = 2;
      setTimeout(() => renderStep(), 300);
    } else {
      showError(input, error, '密码错误，请重试');
      btn.disabled = false;
      btn.textContent = '验证';
    }
  }

  async function handleActivation(input, btn, error) {
    const code = input.value.trim().toUpperCase();
    if (!code || code.length < 19) {
      showError(input, error, '请输入完整激活码 (XXXX-XXXX-XXXX-XXXX)');
      return;
    }
    btn.disabled = true;
    btn.textContent = '验证中…';
    const codeHash = await authSha256(code);
    let matchedUser = null;
    for (const [name, hash] of Object.entries(AUTH_CODE_HASHES)) {
      if (hash === codeHash) { matchedUser = name; break; }
    }
    if (matchedUser) {
      const deviceId = getDeviceFingerprint();
      setAuthToken({ codeHash, device: deviceId, user: matchedUser, time: Date.now() });
      input.classList.add('success');
      error.textContent = '';
      btn.textContent = '✓ 激活成功';

      const card = overlay.querySelector('#auth-card');
      const welcome = document.createElement('div');
      welcome.className = 'auth-welcome';
      welcome.textContent = '👋 欢迎，' + matchedUser;
      card.appendChild(welcome);
      requestAnimationFrame(() => welcome.classList.add('show'));

      setTimeout(() => {
        overlay.classList.add('unlock');
        setTimeout(() => {
          overlay.remove();
          initApp();
        }, 500);
      }, 800);
    } else {
      showError(input, error, '激活码无效，请检查后重试或联系管理员');
      btn.disabled = false;
      btn.textContent = '激活';
    }
  }

  function renderStep() {
    overlay.innerHTML = '<div class="auth-card" id="auth-card">'
      + '<div class="auth-icon">🏆</div>'
      + '<div class="auth-title">2026 World Cup</div>'
      + '<div class="auth-subtitle">预测系统 · 授权访问</div>'
      + '<div class="auth-step-dots">'
      +   '<div class="auth-dot' + (step === 1 ? ' active' : '') + (step >= 1 ? '' : '') + '"></div>'
      +   '<div class="auth-dot' + (step === 2 ? ' active' : '') + '"></div>'
      + '</div>'
      + '<div id="auth-form-content"></div>'
      + '</div>';

    const content = overlay.querySelector('#auth-form-content');
    if (step === 1) {
      content.innerHTML = '<div class="auth-input-group">'
        + '<label class="auth-label">访问密码</label>'
        + '<input type="password" id="auth-password" class="auth-input" placeholder="请输入密码" autocomplete="off">'

        + '</div>'
        + '<button class="auth-btn" id="auth-btn">验证</button>';
      const input = content.querySelector('#auth-password');
      const btn = content.querySelector('#auth-btn');
      const error = content.querySelector('#auth-error');
      btn.addEventListener('click', () => handlePassword(input, btn, error));
      input.addEventListener('keydown', (e) => { if (e.key === 'Enter') btn.click(); });
      setTimeout(() => input.focus(), 100);
    } else if (step === 2) {
      content.innerHTML = '<div class="auth-input-group">'
        + '<label class="auth-label">激活码</label>'
        + '<input type="text" id="auth-code" class="auth-input" placeholder="XXXX-XXXX-XXXX-XXXX" autocomplete="off" maxlength="19">'
        + '<div class="auth-error-text" id="auth-error"></div>'
        + '</div>'
        + '<div class="auth-hint">首次使用？请联系管理员获取专属激活码。<br>激活码与你的身份绑定，请勿分享给他人。</div>'
        + '<button class="auth-btn" id="auth-btn">激活</button>';
      const input = content.querySelector('#auth-code');
      const btn = content.querySelector('#auth-btn');
      const error = content.querySelector('#auth-error');
      input.addEventListener('input', function() {
        let val = input.value.replace(/[^A-Za-z0-9]/g, '').toUpperCase();
        if (val.length > 4) val = val.slice(0, 4) + '-' + val.slice(4);
        if (val.length > 9) val = val.slice(0, 9) + '-' + val.slice(9);
        if (val.length > 14) val = val.slice(0, 14) + '-' + val.slice(14);
        input.value = val.slice(0, 19);
      });
      btn.addEventListener('click', () => handleActivation(input, btn, error));
      input.addEventListener('keydown', (e) => { if (e.key === 'Enter') btn.click(); });
      setTimeout(() => input.focus(), 100);
    }
  }

  renderStep();
  document.body.appendChild(overlay);
}

function renderKnockoutBracket(selDate) {
  const round = getKnockoutRound(selDate);
  if (!round) return '';

  let roundsHtml = '';
  KNOCKOUT_ROUNDS.forEach(r => {
    const active = r.dates.includes(selDate);
    const past = r.dates.every(d => d < selDate);
    const cls = active ? 'knockout-round active' : (past ? 'knockout-round past' : 'knockout-round');
    roundsHtml += `<div class="${cls}">
      <div class="knockout-round-name">${r.name}</div>
      <div class="knockout-round-dates">${r.dates[0]} ~ ${r.dates[r.dates.length-1]}</div>
      <div class="knockout-match-count">${r.matches} 场</div>
    </div>`;
  });

  // Check if we have real match data for this round
  const usDateStr = fromChinaDate(selDate);
  const koMatches = MATCHES.filter(m => m.date === usDateStr && KO_ROUND_NAMES[m.group]);

  let matchesHtml = '';
  if (koMatches.length > 0) {
    matchesHtml = `<div style="margin-top:16px;font-size:0.85rem;color:var(--gold);font-weight:600;margin-bottom:8px;">📋 本轮对阵预测</div>`;
    koMatches.forEach(m => {
      const homeZh = getZhName(m.home), awayZh = getZhName(m.away);
      const homeAdv = m.homeAdvance ? fmtPct(m.homeAdvance) : '';
      const awayAdv = m.awayAdvance ? fmtPct(m.awayAdvance) : '';
      const winner = m.predictedWinner || (m.homeAdvance >= m.awayAdvance ? m.home : m.away);
      const winnerZh = getZhName(winner);
      const score90 = m.totalScore || m.score90 || m.score;
      const isPenalty = m.totalScore && m.totalScore.indexOf('p)') !== -1;
      const resultType = isPenalty ? '点球胜' : '常规胜';
      let pathDisplay = m.likelyPath || '';
      if (pathDisplay) {
        for (const [en, zh] of Object.entries(ZH_NAMES)) {
          pathDisplay = pathDisplay.replace(en, zh);
        }
      } else {
        pathDisplay = winnerZh + ' ' + resultType;
      }
      matchesHtml += `<div class="ko-bracket-match">
        <span class="ko-bracket-num">#${m.num}</span>
        <div class="ko-bracket-teams">
          <span class="ko-bracket-team home">${homeZh} <span class="ko-bracket-pct">${homeAdv}</span></span>
          <span class="ko-bracket-score">${score90}<small>90'</small></span>
          <span class="ko-bracket-team away"><span class="ko-bracket-pct">${awayAdv}</span> ${awayZh}</span>
        </div>
        <span class="ko-bracket-result${isPenalty ? ' penalty' : ''}">${winnerZh} ${resultType}</span>
      </div>`;
    });
  }

  return `<div class="knockout-section">
    <div class="knockout-header">
      <span class="knockout-title">🏆 淘汰赛阶段</span>
      <span class="knockout-subtitle">基于 20,000 次模拟小组结果，逐轮推算</span>
    </div>

  </div>`;
}

// ═══════════════════════════════════════════
//  DATE HELPERS (China timezone = US date +1 day)
//  All date math uses UTC to avoid timezone issues
// ═══════════════════════════════════════════
function addDaysUTC(dateStr, days) {
  const [y, m, d] = dateStr.split('-').map(Number);
  const utc = new Date(Date.UTC(y, m - 1, d + days));
  const yy = utc.getUTCFullYear();
  const mm = String(utc.getUTCMonth() + 1).padStart(2, '0');
  const dd = String(utc.getUTCDate()).padStart(2, '0');
  return yy + '-' + mm + '-' + dd;
}

function toChinaDate(usDateStr) { return addDaysUTC(usDateStr, 1); }
function fromChinaDate(chinaDateStr) { return addDaysUTC(chinaDateStr, -1); }

function getDayOfWeek(dateStr) {
  const [y, m, d] = dateStr.split('-').map(Number);
  return new Date(Date.UTC(y, m - 1, d)).getUTCDay();
}

function formatDateLabel(dateStr) {
  const dayNames = ['周日','周一','周二','周三','周四','周五','周六'];
  const dayName = dayNames[getDayOfWeek(dateStr)];
  const [y, m, d] = dateStr.split('-');
  return `${parseInt(m)}月${parseInt(d)}日 · ${dayName}`;
}

  // "Simulate" result from prediction: favorite wins with predicted score
  const maxProb = Math.max(match.homeWin, match.draw, match.awayWin);
  if (match.homeWin === maxProb) return 'home';

      <div class="date-heading">
        <span class="date-label"><span class="day">${parseInt(m)}月${parseInt(d)}日</span> · ${dayName}</span>
        <span style="font-size:0.75rem;color:var(--text-muted)">${dayMatches.length} 场比赛 · 🇨🇳 北京时间</span>
        <div class="date-divider"></div>
      </div>`;

    // Show group standings for the groups playing on this date
    if (selDate) {
      const groups = new Set();
      filtered.forEach(m => { if (m.group && m.group.length === 1) groups.add(m.group); });
      [...groups].sort().forEach(g => { html += renderGroupStandings(g); });
    }

    for (const match of dayMatches) {
      const past = isPastMatch(match.date);
      const homeFlag = getFlag(match.home);
      const awayFlag = getFlag(match.away);
      const homeZh = getZhName(match.home);
      const awayZh = getZhName(match.away);

      if (past) {
        // ── PAST MATCH: show result ──
        const result = simulateResult(match);
        const homeWinner = result === 'home';
        const awayWinner = result === 'away';
        const isDraw = result === 'draw';
        const score = match.score;
        const [hs, as] = score.split('-').map(Number);
        let resultText = '';
        if (isDraw) resultText = '平局';
        else if (homeWinner) resultText = homeZh + ' 胜';
        else resultText = awayZh + ' 胜';

        html += `
        <div class="match-card past">
          <div class="card-header">
            <span class="result-badge">✅ 已结束</span>
            <span class="match-num">#${match.num} · ${KO_ROUND_NAMES[match.group] ? KO_ROUND_NAMES[match.group] : match.group + ' 组'} · ${match.stadium || match.city}</span>
          </div>
          <div class="teams-row">
            <div class="team">
              <div class="team-flag">${homeFlag}</div>
              <div class="team-name ${homeWinner ? 'result-winner' : ''}">${homeZh}</div>
              <div class="team-name-en">${match.home}</div>
            </div>
            <div class="vs-badge">
              <span class="vs-text">FT</span>
              <span class="result-final">${score}</span>
            </div>
            <div class="team">
              <div class="team-flag">${awayFlag}</div>
              <div class="team-name ${awayWinner ? 'result-winner' : ''}">${awayZh}</div>
              <div class="team-name-en">${match.away}</div>
            </div>
          </div>
          <div class="result-summary">
            📌 ${resultText} · 比分 ${score} · 场地：${match.stadium || match.city}
          </div>
        </div>`;
      } else {
        // ── TODAY / FUTURE: show prediction ──
        const favoriteIsHome = match.homeWin >= match.awayWin;
        const favoriteName = favoriteIsHome ? match.home : match.away;
        const favoriteZh = getZhName(favoriteName);
        const favoriteProb = match.favoriteProb;
        const homePct = fmtPct(match.homeWin);
        const drawPct = fmtPct(match.draw);
        const awayPct = fmtPct(match.awayWin);

        // ── Build KO card HTML (empty string for group matches) ──
        let koHtml = '';
        if (match.homeAdvance !== undefined) {
          const homeAdvPct = fmtPct(match.homeAdvance);
          const awayAdvPct = fmtPct(match.awayAdvance);
          const homeAdvances = match.homeAdvance >= match.awayAdvance;
          const koWinner = match.predictedWinner || (homeAdvances ? match.home : match.away);
          const koWinnerZh = getZhName(koWinner);
          const koWinnerFlag = getFlag(koWinner);
          const isPenalty = match.likelyPath && match.likelyPath.indexOf('点球') !== -1;
          const resultType = isPenalty ? '点球大战胜' : '常规时间胜';
          // Translate likelyPath English names to Chinese
          let pathDisplay = match.likelyPath || '';
          if (pathDisplay) {
            for (const [en, zh] of Object.entries(ZH_NAMES)) {
              pathDisplay = pathDisplay.replace(en, zh);
            }
          } else {
            pathDisplay = koWinnerZh + ' ' + resultType;
          }
          const pathClass = isPenalty ? ' penalty' : '';

          koHtml = `
          <div class="ko-result">
            <span class="ko-result-icon">${koWinnerFlag}</span>
            <div class="ko-result-body">
              <div class="ko-result-text">${koWinnerZh} 晋级</div>
              <div class="ko-result-path${pathClass}">${pathDisplay}</div>
            </div>
          </div>
          <div class="ko-advance-section">
            <div class="ko-advance-item">
              <div class="ko-advance-label">${homeZh} 晋级</div>
              <div class="ko-advance-value ${homeAdvances ? 'advancing' : 'eliminated'}">${homeAdvPct}</div>
              <div class="ko-advance-team">${match.home}</div>
              <div class="ko-advance-bar"><div class="ko-advance-bar-fill ${homeAdvances ? 'advancing' : 'eliminated'}" style="width:${match.homeAdvance*100}%"></div></div>
            </div>
            <div class="ko-advance-item">
              <div class="ko-advance-label">${awayZh} 晋级</div>
              <div class="ko-advance-value ${!homeAdvances ? 'advancing' : 'eliminated'}">${awayAdvPct}</div>
              <div class="ko-advance-team">${match.away}</div>
              <div class="ko-advance-bar"><div class="ko-advance-bar-fill ${!homeAdvances ? 'advancing' : 'eliminated'}" style="width:${match.awayAdvance*100}%"></div></div>
            </div>
          </div>
          ${match.totalScore && match.totalScore.indexOf('p)') !== -1 ? `
          <div class="ko-penalty-score">
            <div class="ko-penalty-row">
              <span class="ko-penalty-label">⚽ 常规时间</span>
              <span class="ko-penalty-val">${match.score90 || match.score}</span>
            </div>
            <div class="ko-penalty-row">
              <span class="ko-penalty-label">🎯 点球大战</span>
              <span class="ko-penalty-val penalty">${match.penaltyScore || '—'}</span>
            </div>
            <div class="ko-penalty-row final">
              <span class="ko-penalty-label">🏆 最终比分</span>
              <span class="ko-penalty-val final">${match.totalScore || match.score}</span>
            </div>
          </div>
          ` : ''}`;
        }

        const missingTags = [];
        if (match.missingFeatures) {
          const mf = match.missingFeatures.split('|').filter(Boolean);
          if (mf.includes('odds')) missingTags.push('<span class="tag missing">缺赔率</span>');
          if (mf.includes('marketValue')) missingTags.push('<span class="tag missing">缺身价</span>');
        }

        const venueTag = match.neutral
          ? '<span class="tag neutral">🏟️ 中立</span>'
          : '<span class="tag home-adv">🏠 ' + homeZh + '主场</span>';

        const notesHtml = match.notes
          ? `<div class="match-notes">📌 ${match.notes}</div>`
          : '';

        const confClass = getConfidenceClass(match.confidence);
        const upsetClass = match.upsetRisk === 'high' ? ' upset-high' : '';

        html += `
        <div class="match-card ${confClass}${upsetClass}">
          <div class="card-header">
            <span class="group-badge">${KO_ROUND_NAMES[match.group] ? KO_ROUND_NAMES[match.group] : match.group + ' 组'}</span>
            <span class="match-num">#${match.num} · ${match.stadium || match.city}</span>
          </div>
          <div class="teams-row">
            <div class="team">
              <div class="team-flag">${homeFlag}</div>
              <div class="team-name">${homeZh}</div>
              <div class="team-name-en">${match.home}</div>
            </div>
            <div class="vs-badge">
              <span class="vs-text">${koHtml ? 'FT' : 'VS'}</span>
              <span class="vs-score">${koHtml ? (match.totalScore || match.score90 || match.score) : match.score}</span>
              ${koHtml ? '<span class="vs-score-sub">最终比分</span>' : ''}
            </div>
            <div class="team">
              <div class="team-flag">${awayFlag}</div>
              <div class="team-name">${awayZh}</div>
              <div class="team-name-en">${match.away}</div>
            </div>
          </div>
          ${koHtml ? koHtml : `
          <!-- ── GROUP MATCH: standard H/D/A ── -->
          <div class="prob-section">
            <div class="prob-item">
              <div class="prob-label">主胜</div>
              <div class="prob-value win">${homePct}</div>
              <div class="prob-bar-track"><div class="prob-bar-fill win" style="width:${match.homeWin*100}%"></div></div>
            </div>
            <div class="prob-item">
              <div class="prob-label">平局</div>
              <div class="prob-value draw">${drawPct}</div>
              <div class="prob-bar-track"><div class="prob-bar-fill draw" style="width:${match.draw*100}%"></div></div>
            </div>
            <div class="prob-item">
              <div class="prob-label">客胜</div>
              <div class="prob-value lose">${awayPct}</div>
              <div class="prob-bar-track"><div class="prob-bar-fill lose" style="width:${match.awayWin*100}%"></div></div>
            </div>
          </div>
          `}
          <div class="match-footer">
            <span style="font-size:0.7rem">${getConfidenceEmoji(match.confidence)} ${getConfidenceLabel(match.confidence)}</span>
            <span style="font-size:0.7rem;color:var(--text-muted)">|</span>
            <span style="font-size:0.7rem;color:var(--gold);font-weight:600">⭐ ${favoriteZh} ${fmtPct(favoriteProb)}</span>
            ${venueTag}
            ${missingTags.join('')}
          </div>
          ${notesHtml}
        </div>`;
      }
    }

    html += `</section>`;
  }

  mainContent.innerHTML = html;
}

(async function() {
  if (AUTH_ENABLED) {
    const savedUser = await checkSavedAuth();
    if (savedUser) {
      // Already authorized — skip auth gate
      console.log('[Auth] Welcome back, ' + savedUser);
      initApp();
    } else {
      // Show auth gate
      showAuthGate();
    }
  } else {
    initApp();
  }
})();
</script>
</body>
